<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>캐치마인드</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D1A;--bg2:#13132A;--card:#1C1C36;--acc:#FFE135;--acc2:#FF4D6D;--acc3:#4DFFD2;--txt:#F0F0FF;--mut:#5858A0;--bdr:rgba(255,255,255,0.08);--r:18px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;color:var(--txt)}
.screen{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── INTRO ── */
#s-intro{background:radial-gradient(ellipse at 35% 25%,#1e1070 0%,#0D0D1A 65%);align-items:center;justify-content:center;overflow-y:auto}
.intro-inner{width:100%;max-width:400px;padding:48px 24px 60px;text-align:center;position:relative}
.logo-eye{display:inline-flex;align-items:center;gap:6px;background:rgba(255,225,53,.12);border:1px solid rgba(255,225,53,.3);color:var(--acc);font-size:11px;font-weight:800;letter-spacing:3px;padding:6px 16px;border-radius:40px;margin-bottom:24px}
.logo-title{font-family:'Black Han Sans',sans-serif;font-size:58px;line-height:1;color:#fff;margin-bottom:8px;text-shadow:0 0 50px rgba(255,225,53,.35),0 0 100px rgba(100,60,255,.25)}
.logo-sub{font-size:14px;color:var(--mut);margin-bottom:52px}
.mode-head{font-size:11px;font-weight:800;color:var(--mut);letter-spacing:2.5px;margin-bottom:14px;text-transform:uppercase}
.mode-row{display:flex;gap:10px;margin-bottom:32px}
.mode-chip{flex:1;height:56px;border-radius:14px;border:1.5px solid var(--bdr);background:var(--card);color:var(--mut);cursor:pointer;font-family:'Black Han Sans',sans-serif;font-size:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s}
.mode-chip span{font-size:10px;font-family:'Noto Sans KR',sans-serif;font-weight:700}
.mode-chip.sel{border-color:var(--acc);background:rgba(255,225,53,.08);color:var(--acc)}
.mode-chip:active{transform:scale(.95)}
.btn-start{width:100%;height:64px;border-radius:var(--r);border:none;background:var(--acc);color:#0D0D1A;font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:1px;cursor:pointer;transition:all .12s;box-shadow:0 8px 32px rgba(255,225,53,.3)}
.btn-start:active{transform:scale(.96);box-shadow:none}
.btn-ghost{margin-top:14px;width:100%;height:50px;border-radius:var(--r);border:1.5px solid var(--bdr);background:transparent;color:var(--mut);font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
.btn-ghost:active{opacity:.6}

/* ── SHARED HEADER ── */
.hdr{display:flex;align-items:center;padding:12px 16px;gap:10px;flex-shrink:0}
.hdr-dk{background:var(--bg2);border-bottom:1px solid var(--bdr)}
.hdr-lt{background:#f2f2f2;border-bottom:1px solid #e0e0e0}
.btn-bk{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-size:18px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.12s}
.btn-bk:active{opacity:.6}
.btn-bk-lt{width:40px;height:40px;border-radius:12px;border:1px solid #ccc;background:#fff;color:#333;font-size:18px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.12s}
.btn-bk-lt:active{opacity:.6}
.hdr-sp{width:40px;flex-shrink:0}
.hdr-ttl{flex:1;text-align:center;font-family:'Black Han Sans',sans-serif;font-size:20px}
.hdr-ttl-lt{flex:1;text-align:center;font-family:'Black Han Sans',sans-serif;font-size:18px;color:#111}

/* ── DIAL ── */
#s-dial{background:radial-gradient(ellipse at 60% 90%,#180050 0%,var(--bg) 65%)}
.dial-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px}
.slot-wrap{width:100%;max-width:340px;position:relative;height:220px;border-radius:24px;overflow:hidden;background:var(--card);border:1.5px solid var(--bdr);margin-bottom:20px}
.slot-wrap::before,.slot-wrap::after{content:'';position:absolute;left:0;right:0;height:70px;z-index:2;pointer-events:none}
.slot-wrap::before{top:0;background:linear-gradient(to bottom,var(--card),transparent)}
.slot-wrap::after{bottom:0;background:linear-gradient(to top,var(--card),transparent)}
.slot-hl{position:absolute;left:14px;right:14px;top:50%;transform:translateY(-50%);height:58px;border-radius:14px;background:rgba(255,225,53,.07);border:1.5px solid rgba(255,225,53,.22);z-index:1;pointer-events:none}
.slot-track{position:absolute;width:100%;will-change:transform;display:flex;flex-direction:column}
.slot-item{height:58px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--mut);flex-shrink:0;transition:color .3s,font-size .3s}
.slot-item.ctr{color:var(--acc);font-size:30px;font-family:'Black Han Sans',sans-serif}
.reroll-info{font-size:13px;color:var(--mut);font-weight:700;margin-bottom:6px;letter-spacing:.5px;height:20px;text-align:center}
.reroll-dots{display:flex;gap:6px;justify-content:center;margin-bottom:20px}
.rdot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--mut);background:transparent;transition:.2s}
.rdot.used{background:var(--mut)}
.dial-btns{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px}
.btn-reroll{height:56px;border-radius:var(--r);border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-family:'Black Han Sans',sans-serif;font-size:17px;letter-spacing:.5px;cursor:pointer;transition:all .12s}
.btn-reroll:active{transform:scale(.97)}
.btn-reroll:disabled{opacity:.35;cursor:not-allowed}
.btn-go{height:64px;border-radius:var(--r);border:none;background:var(--acc);color:#0D0D1A;font-family:'Black Han Sans',sans-serif;font-size:22px;letter-spacing:1px;cursor:pointer;box-shadow:0 6px 28px rgba(255,225,53,.28);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .3s,transform .3s}
.btn-go.vis{opacity:1;pointer-events:auto;transform:translateY(0)}
.btn-go:active{transform:scale(.96)!important;box-shadow:none}

/* ── DRAW ── */
#s-draw{background:#1a1a2e}
.draw-hdr{display:flex;align-items:center;padding:10px 14px;gap:10px;background:#111120;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.draw-word{flex:1;text-align:center;font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--acc);letter-spacing:1px}
.draw-timer{font-family:'Black Han Sans',sans-serif;font-size:20px;color:#fff;background:var(--card);padding:6px 14px;border-radius:12px;border:1.5px solid var(--bdr);min-width:64px;text-align:center;transition:border-color .3s,color .3s}
.draw-timer.warn{color:var(--acc2);border-color:var(--acc2);animation:blink .5s step-start infinite}
@keyframes blink{50%{opacity:.4}}
#drawCanvas{flex:1;display:block;touch-action:none;cursor:crosshair;background:#fff;width:100%}
.tools-wrap{background:#111120;border-top:1px solid rgba(255,255,255,.07);padding:10px 12px 14px;flex-shrink:0}
.tools-top{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.ti{width:42px;height:42px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--card);color:var(--txt);font-size:18px;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:.12s}
.ti.on{border-color:var(--acc);background:rgba(255,225,53,.1)}
.ti:active{transform:scale(.9)}
.sz-grp{display:flex;gap:6px}
.sz-btn{width:42px;height:42px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--card);cursor:pointer;display:grid;place-items:center;transition:.12s}
.sz-btn.on{border-color:rgba(255,255,255,.4)}
.sz-btn:active{transform:scale(.9)}
.sz-dot{background:#fff;border-radius:50%}
.ml{margin-left:auto}
.palette{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.palette::-webkit-scrollbar{display:none}
.clr{width:34px;height:34px;border-radius:50%;flex-shrink:0;cursor:pointer;border:3px solid transparent;outline:2px solid transparent;outline-offset:2px;transition:transform .12s,outline .12s}
.clr.on{outline:2px solid #fff;transform:scale(1.18)}
.clr:active{transform:scale(.9)}
.btn-sub{width:100%;height:52px;border-radius:var(--r);border:none;margin-top:10px;background:var(--acc);color:#0D0D1A;font-family:'Black Han Sans',sans-serif;font-size:18px;letter-spacing:1px;cursor:pointer;transition:.12s}
.btn-sub:active{transform:scale(.97)}

/* ── COUNTDOWN ── */
#ov-cd{display:none;position:fixed;inset:0;z-index:100;background:rgba(13,13,26,.95);place-items:center}
#ov-cd.show{display:grid}
.cd-n{font-family:'Black Han Sans',sans-serif;font-size:130px;color:var(--acc);animation:popIn .45s cubic-bezier(.15,1.4,.4,1);text-shadow:0 0 60px rgba(255,225,53,.5);line-height:1}
@keyframes popIn{from{transform:scale(.2);opacity:0}to{transform:scale(1);opacity:1}}

/* ── VIEW ── */
#s-view{background:#fff}
#viewCanvas{flex:1;display:block;touch-action:none;cursor:pointer;background:#fff;width:100%}
.view-bot{background:#f4f4f4;border-top:1px solid #e0e0e0;padding:14px 20px;flex-shrink:0;text-align:center}
.view-hint-txt{font-size:13px;color:#888;margin-bottom:4px}
.view-el{font-family:'Black Han Sans',sans-serif;font-size:34px;color:#111;display:flex;align-items:baseline;justify-content:center;gap:4px}
.view-el small{font-size:16px;color:#888;font-family:'Noto Sans KR',sans-serif}
.vhdr-btns{display:flex;gap:8px}
.vhbtn{height:36px;padding:0 12px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:12px;font-weight:800;color:#444;cursor:pointer;white-space:nowrap;transition:.12s}
.vhbtn:active{background:#eee}

/* ── OVERLAYS ── */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);place-items:center}
.ov.show{display:grid}
.ov-card{background:var(--card);border-radius:26px;padding:32px 26px;width:calc(100% - 48px);max-width:360px;border:1.5px solid var(--bdr);animation:slideUp .28s cubic-bezier(.15,1.3,.4,1)}
.ov-card-lt{background:#fff;border-radius:26px;padding:32px 26px;width:calc(100% - 48px);max-width:360px;animation:slideUp .28s cubic-bezier(.15,1.3,.4,1)}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Guess */
.guess-q{font-family:'Black Han Sans',sans-serif;font-size:26px;color:#111;text-align:center;margin-bottom:26px}
.guess-row{display:flex;gap:12px}
.g-y{flex:1;height:58px;border-radius:16px;border:none;background:#111;color:#fff;font-family:'Black Han Sans',sans-serif;font-size:20px;cursor:pointer;transition:.12s}
.g-y:active{transform:scale(.96)}
.g-n{flex:1;height:58px;border-radius:16px;border:2px solid #ddd;background:#fff;color:#555;font-family:'Black Han Sans',sans-serif;font-size:20px;cursor:pointer;transition:.12s}
.g-n:active{transform:scale(.96)}

/* Hint */
#ov-hint{align-items:flex-end}
.hint-sheet{background:var(--bg2);border-radius:26px 26px 0 0;padding:22px 22px 40px;width:100%;max-width:480px;border:1.5px solid var(--bdr);border-bottom:none;animation:slideUpS .28s cubic-bezier(.15,1.3,.4,1)}
@keyframes slideUpS{from{transform:translateY(100%)}to{transform:translateY(0)}}
.h-handle{width:36px;height:4px;background:var(--mut);border-radius:4px;margin:0 auto 18px}
.h-title{font-family:'Black Han Sans',sans-serif;font-size:20px;margin-bottom:14px}
.h-tabs{display:flex;gap:8px;margin-bottom:16px}
.h-tab{flex:1;height:46px;border-radius:12px;border:1.5px solid var(--bdr);background:var(--card);color:var(--mut);font-size:13px;font-weight:800;cursor:pointer;transition:.12s}
.h-tab.ok{color:var(--txt);border-color:rgba(255,255,255,.15)}
.h-tab.on{border-color:var(--acc3);background:rgba(77,255,210,.1);color:var(--acc3)}
.h-tab:active{transform:scale(.96)}
.h-box{background:var(--card);border-radius:14px;padding:18px;min-height:60px;border:1.5px solid var(--bdr);margin-bottom:14px}
.h-box p{font-size:16px;line-height:1.65;font-weight:700;color:var(--txt)}
.h-box .emp{color:var(--mut);font-weight:400;font-size:14px}
.btn-cls{width:100%;height:48px;border-radius:var(--r);border:1.5px solid var(--bdr);background:transparent;color:var(--mut);font-size:14px;font-weight:700;cursor:pointer}

/* Answer */
.ans-lbl{font-size:11px;font-weight:800;color:var(--mut);letter-spacing:3px;text-align:center;margin-bottom:10px}
.ans-word{font-family:'Black Han Sans',sans-serif;font-size:46px;color:var(--acc);text-align:center;margin-bottom:6px}
.ans-sub{font-size:13px;color:var(--mut);text-align:center;margin-bottom:24px}

/* ── RESULT ── */
#s-result{background:radial-gradient(ellipse at 50% 10%,#1a0060 0%,var(--bg) 65%);overflow-y:auto}
.res-in{max-width:420px;margin:0 auto;padding:44px 24px 60px}
.res-badge{display:inline-block;background:var(--acc);color:#0D0D1A;font-size:11px;font-weight:900;letter-spacing:3px;padding:5px 14px;border-radius:30px;margin-bottom:18px}
.res-h{font-family:'Black Han Sans',sans-serif;font-size:38px;margin-bottom:4px}
.res-wl{font-size:14px;color:var(--mut);margin-bottom:28px}
.res-wl strong{color:var(--acc)}
.res-tc{background:var(--card);border-radius:22px;padding:26px;border:1.5px solid var(--bdr);margin-bottom:22px;text-align:center}
.rt-lbl{font-size:11px;font-weight:800;color:var(--mut);letter-spacing:2px;margin-bottom:8px}
.rt-val{font-family:'Black Han Sans',sans-serif;font-size:58px;color:var(--acc3);line-height:1}
.rt-u{font-size:18px;color:var(--mut)}
.res-sh{font-size:11px;font-weight:800;color:var(--mut);letter-spacing:2px;margin-bottom:12px}
.rec-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.rec-item{background:var(--card);border-radius:14px;padding:13px 16px;border:1.5px solid var(--bdr);display:flex;align-items:center;gap:12px}
.rec-rk{font-family:'Black Han Sans',sans-serif;font-size:20px;min-width:30px}
.rec-inf{flex:1}
.rec-w{font-weight:800;font-size:15px}
.rec-m{font-size:11px;color:var(--mut);margin-top:1px}
.rec-t{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--acc3)}
.r1{color:#FFD700}.r2{color:#C0C0C0}.r3{color:#CD7F32}.rN{color:var(--mut)}
.res-btns{display:flex;flex-direction:column;gap:10px}
.btn-again{height:60px;border-radius:var(--r);border:none;background:var(--acc);color:#0D0D1A;font-family:'Black Han Sans',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;transition:.12s}
.btn-again:active{transform:scale(.97)}
.btn-home-r{height:50px;border-radius:var(--r);border:1.5px solid var(--bdr);background:transparent;color:var(--mut);font-size:14px;font-weight:700;cursor:pointer;transition:.12s}
.btn-home-r:active{opacity:.6}

/* ── RECORDS ── */
#s-records{overflow-y:auto}
.rec-sb{max-width:460px;margin:0 auto;padding:20px 20px 60px}
.rec-sb h2{font-family:'Black Han Sans',sans-serif;font-size:26px;margin-bottom:18px}
.btn-clear-r{width:100%;height:48px;border-radius:var(--r);border:1.5px solid rgba(255,77,109,.3);background:transparent;color:var(--acc2);font-size:14px;font-weight:800;cursor:pointer;margin-top:22px}
.empty-s{text-align:center;padding:60px 20px;color:var(--mut);font-size:15px}
</style>
</head>
<body>

<!-- ════ INTRO ════ -->
<div id="s-intro" class="screen active">
  <div class="intro-inner">
    <div class="logo-eye">✏️ DRAWING GAME</div>
    <div class="logo-title">캐치마인드</div>
    <div class="logo-sub">그려서 맞혀봐요!</div>
    <div class="mode-head">드로잉 시간 선택</div>
    <div class="mode-row">
      <button class="mode-chip sel" data-m="1" onclick="pickMode(1)">1분<span>스피드</span></button>
      <button class="mode-chip"     data-m="3" onclick="pickMode(3)">3분<span>스탠다드</span></button>
      <button class="mode-chip"     data-m="5" onclick="pickMode(5)">5분<span>아티스트</span></button>
    </div>
    <button class="btn-start" onclick="goToDial()">게임 시작! 🎰</button>
    <button class="btn-ghost" onclick="openRecs()">🏆 기록 보기</button>
  </div>
</div>

<!-- ════ DIAL ════ -->
<div id="s-dial" class="screen">
  <div class="hdr hdr-dk">
    <button class="btn-bk" onclick="goHome()">←</button>
    <div class="hdr-ttl">제시어 뽑기</div>
    <div class="hdr-sp"></div>
  </div>
  <div class="dial-body">
    <div class="slot-wrap">
      <div class="slot-hl"></div>
      <div id="slotTrack" class="slot-track"></div>
    </div>
    <div class="reroll-info" id="riInfo">돌리는 중…</div>
    <div class="reroll-dots">
      <div class="rdot" id="d0"></div>
      <div class="rdot" id="d1"></div>
      <div class="rdot" id="d2"></div>
    </div>
    <div class="dial-btns">
      <button class="btn-reroll" id="btnReroll" onclick="doReroll()" disabled>🔄 다시 돌리기 (<span id="rlLeft">3</span>/3)</button>
      <button class="btn-go" id="btnGo" onclick="startDraw()">그리기 시작! ✏️</button>
    </div>
  </div>
</div>

<!-- ════ DRAW ════ -->
<div id="s-draw" class="screen">
  <div class="draw-hdr">
    <button class="btn-bk" onclick="backDraw()" style="border:1.5px solid rgba(255,255,255,.07)">←</button>
    <div class="draw-word" id="drawWord">---</div>
    <div class="draw-timer" id="drawTimer">0:00</div>
  </div>
  <canvas id="drawCanvas"></canvas>
  <div class="tools-wrap">
    <div class="tools-top">
      <button class="ti on" id="tPen" onclick="setTool('pencil')" title="연필">✏️</button>
      <button class="ti"    id="tErs" onclick="setTool('eraser')" title="지우개">◻️</button>
      <div class="sz-grp">
        <button class="sz-btn on" id="szS" onclick="setSize('S')"><div class="sz-dot" style="width:5px;height:5px"></div></button>
        <button class="sz-btn"    id="szM" onclick="setSize('M')"><div class="sz-dot" style="width:10px;height:10px"></div></button>
        <button class="sz-btn"    id="szL" onclick="setSize('L')"><div class="sz-dot" style="width:16px;height:16px"></div></button>
      </div>
      <button class="ti ml" onclick="doUndo()" title="실행취소">↩️</button>
      <button class="ti"    onclick="doClear()" title="전체지우기">🗑️</button>
    </div>
    <div class="palette" id="palette"></div>
    <button class="btn-sub" onclick="submitDraw()">제출하기 ✓</button>
  </div>
</div>

<!-- ════ COUNTDOWN ════ -->
<div id="ov-cd">
  <div style="text-align:center">
    <div class="cd-n" id="cdN">3</div>
    <div style="color:var(--mut);font-size:15px;font-weight:800;letter-spacing:2px;margin-top:14px">준비하세요!</div>
  </div>
</div>

<!-- ════ VIEW ════ -->
<div id="s-view" class="screen">
  <div class="hdr hdr-lt">
    <button class="btn-bk-lt" onclick="backView()">←</button>
    <div class="hdr-ttl-lt">맞춰보세요!</div>
    <div class="vhdr-btns">
      <button class="vhbtn" onclick="openHint()">💡 힌트</button>
      <button class="vhbtn" onclick="openAns()">👁 정답</button>
    </div>
  </div>
  <canvas id="viewCanvas"></canvas>
  <div class="view-bot">
    <div class="view-hint-txt">👆 화면을 두드려서 정답을 맞춰보세요</div>
    <div class="view-el"><span id="vSec">0.0</span><small>초</small></div>
  </div>
</div>

<!-- ════ OVERLAYS ════ -->
<div class="ov" id="ov-guess">
  <div class="ov-card-lt">
    <div class="guess-q">맞추셨습니까?</div>
    <div class="guess-row">
      <button class="g-y" onclick="guessY()">예 ✓</button>
      <button class="g-n" onclick="guessN()">아니오</button>
    </div>
  </div>
</div>

<div class="ov" id="ov-hint" style="align-items:flex-end">
  <div class="hint-sheet">
    <div class="h-handle"></div>

const CLRS=[{n:'검정',h:'#111111'},{n:'흰색',h:'#FFFFFF'},{n:'빨강',h:'#EF4444'},{n:'주황',h:'#F97316'},{n:'노랑',h:'#FACC15'},{n:'연두',h:'#84CC16'},{n:'초록',h:'#22C55E'},{n:'청록',h:'#14B8A6'},{n:'하늘',h:'#38BDF8'},{n:'파랑',h:'#3B82F6'},{n:'남색',h:'#4338CA'},{n:'보라',h:'#8B5CF6'},{n:'분홍',h:'#EC4899'},{n:'갈색',h:'#92400E'},{n:'회색',h:'#9CA3AF'},{n:'금색',h:'#F59E0B'}];

/* ══ STATE ══ */
let selMode=1,wordObj=null,dialItems=[],rerollUsed=0,settled=false;
let drawTimerIv=null,drawSec=0,snaps=[],tool='pencil',clr='#111111',sz='S';

/* ══ SCREEN ══ */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

/* ══ INTRO ══ */
function pickMode(m){selMode=m;document.querySelectorAll('.mode-chip').forEach(c=>c.classList.toggle('sel',+c.dataset.m===m))}
function goHome(){clearInterval(drawTimerIv);clearInterval(viewIv);showScreen('s-intro')}
function openRecs(){showScreen('s-records');renderRecsFull()}

/* ══ DIAL ══ */
function goToDial(){showScreen('s-dial');rerollUsed=0;settled=false;updUI();buildSlot();autoSpin()}
function buildSlot(){
  const t=document.getElementById('slotTrack');
  const sh=[...W].sort(()=>Math.random()-.5);
  dialItems=[...sh,...sh,...sh];
  t.innerHTML='';
  dialItems.forEach(item=>{const d=document.createElement('div');d.className='slot-item';d.textContent=item.w;t.appendChild(d)});
  setY(0,false);
}
function setY(idx,anim){
  const t=document.getElementById('slotTrack');
  const y=81-idx*58;
  t.style.transition=anim?'transform 2.8s cubic-bezier(0.06,0.65,0.1,1)':'none';
  t.style.transform=`translateY(${y}px)`;
  hlCenter(idx);
}
function hlCenter(idx){const t=document.getElementById('slotTrack');[...t.children].forEach((c,i)=>c.classList.toggle('ctr',i===idx))}
function autoSpin(){
  settled=false;
  document.getElementById('btnGo').classList.remove('vis');
  document.getElementById('btnReroll').disabled=true;
  const seg=Math.floor(dialItems.length/3);
  const ti=seg+Math.floor(Math.random()*seg);
  setY(0,false);
  requestAnimationFrame(()=>requestAnimationFrame(()=>setY(ti,true)));
  setTimeout(()=>{hlCenter(ti);wordObj=dialItems[ti];settled=true;updUI();document.getElementById('btnGo').classList.add('vis')},3100);
}
function doReroll(){if(!settled||rerollUsed>=3)return;rerollUsed++;updUI();autoSpin()}
function updUI(){
  const left=3-rerollUsed;
  document.getElementById('rlLeft').textContent=left;
  document.getElementById('btnReroll').disabled=!settled||left<=0;
  for(let i=0;i<3;i++)document.getElementById('d'+i).classList.toggle('used',i<rerollUsed);
  document.getElementById('riInfo').textContent=settled?(left<=0?'다시 돌리기 불가 (3/3 소진)':`다시 돌릴 수 있어요 (${left}번 남음)`):'돌리는 중…';
}

/* ══ DRAW ══ */
function startDraw(){
  showScreen('s-draw');
  hUnlock=0;hCurLv=0;snaps=[];tool='pencil';clr='#111111';sz='S';
  document.getElementById('tPen').classList.add('on');
  document.getElementById('tErs').classList.remove('on');
  ['S','M','L'].forEach(s=>document.getElementById('sz'+s).classList.toggle('on',s==='S'));
  document.getElementById('drawWord').textContent=wordObj.w;
  buildPalette();
  requestAnimationFrame(()=>{initCvs();startTimer()});
}
function buildPalette(){
  const pal=document.getElementById('palette');pal.innerHTML='';
  CLRS.forEach(c=>{
    const el=document.createElement('div');
    el.className='clr'+(c.h===clr?' on':'');
    el.style.background=c.h;
    if(c.h==='#FFFFFF')el.style.border='3px solid #ccc';
    el.title=c.n;
    el.addEventListener('pointerdown',e=>{
      e.stopPropagation();
      clr=c.h;tool='pencil';
      document.getElementById('tPen').classList.add('on');
      document.getElementById('tErs').classList.remove('on');
      pal.querySelectorAll('.clr').forEach(x=>x.classList.remove('on'));
      el.classList.add('on');
    });
    pal.appendChild(el);
  });
}
function initCvs(){
  cvs=document.getElementById('drawCanvas');
  const rect=cvs.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  cvs.width=Math.round(rect.width*dpr);
  cvs.height=Math.round(rect.height*dpr);
  cvs.style.width=rect.width+'px';
  cvs.style.height=rect.height+'px';
  ctx=cvs.getContext('2d');
  ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,rect.width,rect.height);
  saveSnap();
  cvs.addEventListener('pointerdown',pDown);
  cvs.addEventListener('pointermove',pMove);
  cvs.addEventListener('pointerup',pUp);
  cvs.addEventListener('pointercancel',pUp);
}
function detach(){
  if(!cvs)return;
  cvs.removeEventListener('pointerdown',pDown);
  cvs.removeEventListener('pointermove',pMove);
  cvs.removeEventListener('pointerup',pUp);
  cvs.removeEventListener('pointercancel',pUp);
}
function getP(e){const r=cvs.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top}}
function pDown(e){e.preventDefault();drawing=true;cvs.setPointerCapture(e.pointerId);const p=getP(e);lastP=p;ctx.beginPath();ctx.arc(p.x,p.y,br()/2,0,Math.PI*2);ctx.fillStyle=tool==='eraser'?'#fff':clr;ctx.fill()}
function pMove(e){e.preventDefault();if(!drawing)return;const p=getP(e);ctx.beginPath();ctx.lineCap='round';ctx.lineJoin='round';ctx.lineWidth=br();ctx.strokeStyle=tool==='eraser'?'#fff':clr;ctx.moveTo(lastP.x,lastP.y);ctx.lineTo(p.x,p.y);ctx.stroke();lastP=p}
function pUp(){if(!drawing)return;drawing=false;lastP=null;saveSnap()}
function br(){return(tool==='eraser'?3.5:1)*SZ[sz]}
function saveSnap(){if(!cvs)return;snaps.push(cvs.toDataURL());if(snaps.length>30)snaps.shift()}
function doUndo(){if(snaps.length<=1)return;snaps.pop();const img=new Image();img.onload=()=>{const r=cvs.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);ctx.drawImage(img,0,0,r.width,r.height)};img.src=snaps[snaps.length-1]}
function doClear(){if(!cvs)return;const r=cvs.getBoundingClientRect();ctx.fillStyle='#fff';ctx.fillRect(0,0,r.width,r.height);saveSnap()}
function setTool(t){tool=t;document.getElementById('tPen').classList.toggle('on',t==='pencil');document.getElementById('tErs').classList.toggle('on',t==='eraser')}
function setSize(s){sz=s;['S','M','L'].forEach(x=>document.getElementById('sz'+x).classList.toggle('on',x===s))}
function startTimer(){clearInterval(drawTimerIv);drawSec=selMode*60;renderTimer();drawTimerIv=setInterval(()=>{drawSec--;renderTimer();if(drawSec<=0){clearInterval(drawTimerIv);submitDraw()}},1000)}
function renderTimer(){const el=document.getElementById('drawTimer');const m=Math.floor(drawSec/60),s=drawSec%60;el.textContent=`${m}:${String(s).padStart(2,'0')}`;el.classList.toggle('warn',drawSec<=10)}
function submitDraw(){clearInterval(drawTimerIv);detach();countdown(()=>showView())}
function backDraw(){clearInterval(drawTimerIv);detach();showScreen('s-dial')}

/* ══ COUNTDOWN ══ */
function countdown(cb){
  const ov=document.getElementById('ov-cd'),n=document.getElementById('cdN');
  ov.classList.add('show');let c=3;n.textContent=c;
  const iv=setInterval(()=>{c--;if(c<=0){clearInterval(iv);ov.classList.remove('show');cb();return}n.style.animation='none';void n.offsetWidth;n.style.animation='';n.textContent=c},900);
}

/* ══ VIEW ══ */
function showView(){
  showScreen('s-view');viewSec=0;document.getElementById('vSec').textContent='0.0';
  requestAnimationFrame(()=>{
    copyView();
    viewIv=setInterval(()=>{viewSec+=.1;document.getElementById('vSec').textContent=viewSec.toFixed(1)},100);
  });
  document.getElementById('viewCanvas').onclick=()=>openOv('ov-guess');
}
function copyView(){
  const src=document.getElementById('drawCanvas');
  const dst=document.getElementById('viewCanvas');
  const dpr=window.devicePixelRatio||1;
  const rect=dst.getBoundingClientRect();
  dst.width=Math.round(rect.width*dpr);dst.height=Math.round(rect.height*dpr);
  dst.style.width=rect.width+'px';dst.style.height=rect.height+'px';
  const dc=dst.getContext('2d');dc.scale(dpr,dpr);
  dc.fillStyle='#fff';dc.fillRect(0,0,rect.width,rect.height);
  const sw=src.width/dpr,sh=src.height/dpr,dw=rect.width,dh=rect.height;
  const sc=Math.min(dw/sw,dh/sh);
  dc.drawImage(src,(dw-sw*sc)/2,(dh-sh*sc)/2,sw*sc,sh*sc);
}
function backView(){clearInterval(viewIv);goHome()}

/* ══ GUESS ══ */
function guessY(){clearInterval(viewIv);closeOv('ov-guess');const t=viewSec.toFixed(1);saveRec(t);document.getElementById('rWord').textContent=wordObj.w;document.getElementById('rTime').textContent=t;renderTop();showScreen('s-result')}
function guessN(){closeOv('ov-guess')}

/* ══ HINT ══ */
function openHint(){hUnlock=Math.max(hUnlock,1);openOv('ov-hint');renderHint(hCurLv||1)}
function showHLv(lv){if(lv>hUnlock+1)return;hUnlock=Math.max(hUnlock,lv);hCurLv=lv;renderHint(lv)}
function renderHint(lv){
  hCurLv=lv;
  const m={1:`초성: ${wordObj.c}`,2:`사용처: ${wordObj.u}`,3:`예시: ${wordObj.e}`};
  document.getElementById('hBox').innerHTML=`<p>${m[lv]}</p>`;
  [1,2,3].forEach(l=>{const b=document.getElementById('ht'+l);b.classList.toggle('ok',l<=hUnlock);b.classList.toggle('on',l===lv);b.disabled=l>hUnlock+1});
}

/* ══ ANSWER ══ */
function openAns(){document.getElementById('aWord').textContent=wordObj.w;document.getElementById('aSub').textContent=wordObj.e;openOv('ov-ans')}

/* ══ OVERLAYS ══ */
function openOv(id){document.getElementById(id).classList.add('show')}
function closeOv(id){document.getElementById(id).classList.remove('show')}

/* ══ RECORDS ══ */
function getRecs(){return JSON.parse(localStorage.getItem(RK)||'[]')}
function saveRec(t){const r=getRecs();r.push({word:wordObj.w,time:parseFloat(t),mode:selMode,ts:new Date().toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})});r.sort((a,b)=>a.time-b.time);localStorage.setItem(RK,JSON.stringify(r))}
function clearRecs(){if(confirm('모든 기록을 삭제할까요?')){localStorage.removeItem(RK);renderRecsFull()}}
const MD=['🥇','🥈','🥉'];const RC=['r1','r2','r3','rN','rN'];
function recH(r,i){return`<div class="rec-item"><div class="rec-rk ${RC[Math.min(i,4)]}">${MD[i]||'#'+(i+1)}</div><div class="rec-inf"><div class="rec-w">${r.word}</div><div class="rec-m">${r.ts} · ${r.mode}분</div></div><div class="rec-t">${r.time}s</div></div>`}
function renderTop(){const r=getRecs().slice(0,5);document.getElementById('rList').innerHTML=r.length?r.map(recH).join(''):'<div class="empty-s">기록 없음</div>'}
function renderRecsFull(){const r=getRecs();document.getElementById('recFull').innerHTML=r.length?r.map(recH).join(''):'<div class="empty-s">📭 아직 기록이 없어요</div>'}
function playAgain(){goToDial()}
</script>
