<style>
  #debug-console { 
    position: fixed; top: 0; left: 0; width: 100%; max-height: 40%; 
    background: rgba(0, 0, 0, 0.95); color: #0f0; font-family: monospace; 
    font-size: 13px; overflow-y: scroll; z-index: 999999; padding: 15px; 
    display: none; border-bottom: 3px solid #ff4d4d; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    word-break: break-all;
  }
  #debug-console.show { display: block; }
  .err-msg { color: #ff5555; margin-bottom: 8px; border-bottom: 1px dashed #555; padding-bottom: 8px; font-weight: bold;}
  .log-msg { color: #aaa; margin-bottom: 4px; font-size: 11px;}
  .btn-close-debug {
    position: absolute; top: 10px; right: 10px; background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; font-weight: bold;
  }
</style>

<div id="debug-console">
  <button class="btn-close-debug" onclick="document.getElementById('debug-console').classList.remove('show')">닫기</button>
  <div style="color:yellow; margin-bottom:10px; font-weight:bold;">[디버거 작동 중...] 에러 발생 시 여기에 기록됩니다.</div>
  <div id="debug-logs"></div>
</div>

<script>
  const dbgWrap = document.getElementById('debug-console');
  const dbgLogs = document.getElementById('debug-logs');

  function printDebug(msg, isErr=false) {
    dbgWrap.classList.add('show');
    dbgLogs.innerHTML += `<div class="${isErr ? 'err-msg' : 'log-msg'}">${msg}</div>`;
    dbgWrap.scrollTop = dbgWrap.scrollHeight;
  }

  // 1. 치명적인 스크립트 에러 감지 (화면 멈춤의 주원인)
  window.onerror = function(msg, url, lineNo, columnNo, error) {
    const errorDetails = error?.stack ? error.stack.replace(/\n/g, '<br>') : '스택 정보 없음';
    printDebug(`🚨 [치명적 에러]<br>메시지: ${msg}<br>위치: ${lineNo}줄 ${columnNo}칸<br>상세: ${errorDetails}`, true);
    return false; // 브라우저 기본 에러 처리 유지
  };

  // 2. 비동기/Promise(통신 등) 에러 감지
  window.onunhandledrejection = function(event) {
    printDebug(`⚠️ [비동기 에러]<br>이유: ${event.reason}`, true);
  };

  // 3. 내가 심어놓은 console.log/error도 화면에 출력하도록 가로채기
  const originalLog = console.log;
  const originalError = console.error;

  console.log = function(...args) {
    printDebug(`[로그] ${args.join(' ')}`);
    originalLog.apply(console, args);
  };

  console.error = function(...args) {
    printDebug(`❌ [콘솔 에러] ${args.join(' ')}`, true);
    originalError.apply(console, args);
  };

  // Canvas toDataURL 특수 에러 추적 (보안 에러, 크기 초과 등)
  const originalToDataURL = HTMLCanvasElement.prototype.toDataURL;
  HTMLCanvasElement.prototype.toDataURL = function(...args) {
    try {
      console.log(`캔버스 저장 시도 (크기: ${this.width}x${this.height})`);
      return originalToDataURL.apply(this, args);
    } catch (e) {
      console.error(`캔버스 저장 실패: ${e.message}`);
      throw e;
    }
  };
</script>
