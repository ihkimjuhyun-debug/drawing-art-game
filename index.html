<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DRAW GAME HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {--bg:#0D0D1A; --bg2:#13132A; --card:#1C1C36; --acc:#FFE135; --acc2:#FF4D6D; --acc3:#4DFFD2; --g1:#7C3AED; --g2:#2563EB; --txt:#F0F0FF; --mut:#5858A0; --bdr:rgba(255,255,255,0.12); --r:20px;}
*, *::before, *::after {box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
html, body {width:100%; height:100%; overflow:hidden; background:var(--bg); touch-action:manipulation;}
body {font-family:'Noto Sans KR', sans-serif; color:var(--txt);}
.screen {display:none; position:fixed; inset:0; flex-direction:column; overflow:hidden;}
.screen.active {display:flex;}
.scrollable {overflow-y:auto; -webkit-overflow-scrolling:touch;}
.font-black {font-family:'Black Han Sans', sans-serif;}

/* ═══ HEADER (Glassmorphism) ═══ */
.hdr {display:flex; align-items:center; padding:12px 16px; gap:12px; flex-shrink:0; z-index:100; background:rgba(19, 19, 42, 0.7); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px); border-bottom:1px solid var(--bdr);}
.hdr-ttl {flex:1; text-align:center; font-family:'Black Han Sans',sans-serif; font-size:20px; color:#fff;}
.btn-bk {width:42px; height:42px; border-radius:12px; border:1.5px solid var(--bdr); background:rgba(255,255,255,0.05); color:#fff; display:grid; place-items:center; cursor:pointer;}

/* ═══ MAIN MENU ═══ */
#s-main {background:radial-gradient(circle at 20% 20%, #1a1060 0%, #0D0D1A 80%); align-items:center; justify-content:center; padding:20px;}
.game-card {width:100%; max-width:400px; border-radius:24px; padding:28px 24px; border:1.5px solid var(--bdr); cursor:pointer; margin-bottom:16px; background:var(--card); transition:0.2s;}
.game-card:active {transform:scale(0.96);}
.gc-title {font-family:'Black Han Sans',sans-serif; font-size:26px; margin-bottom:4px;}
.gc-desc {font-size:13px; color:var(--mut); line-height:1.5;}

/* ═══ DIAL & SLOT ═══ */
.dial-body {flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 24px;}
.slot-wrap {width:100%; max-width:340px; position:relative; height:240px; border-radius:24px; overflow:hidden; background:var(--card); border:1.5px solid var(--bdr); margin-bottom:30px;}
.slot-wrap::before {content:''; position:absolute; top:0; left:0; right:0; height:80px; z-index:2; background:linear-gradient(to bottom,var(--card),transparent);}
.slot-wrap::after {content:''; position:absolute; bottom:0; left:0; right:0; height:80px; z-index:2; background:linear-gradient(to top,var(--card),transparent);}
.slot-hl {position:absolute; left:14px; right:14px; top:50%; margin-top:-34px; height:68px; border-radius:16px; background:rgba(255,225,53,0.1); border:1.5px solid var(--acc); z-index:1;}
.slot-track {position:absolute; width:100%; top:86px; will-change:transform; display:flex; flex-direction:column;}
.slot-item {height:68px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:var(--mut);}
.slot-item.ctr {color:var(--acc); font-size:34px; font-family:'Black Han Sans',sans-serif;}
.btn-go {height:66px; width:100%; max-width:340px; border-radius:var(--r); border:none; background:var(--acc); color:#0D0D1A; font-family:'Black Han Sans',sans-serif; font-size:22px; opacity:0; pointer-events:none; transform:translateY(10px); transition:0.4s;}
.btn-go.vis {opacity:1; pointer-events:auto; transform:translateY(0);}

/* ═══ CANVAS ═══ */
canvas {background:#fff; touch-action:none;}
.tools-wrap {background:#111120; padding:12px 16px 24px; border-top:1px solid var(--bdr);}
.palette {display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;}
.clr {width:38px; height:38px; border-radius:50%; flex-shrink:0; border:2px solid rgba(255,255,255,0.1);}
.clr.on {outline:3px solid #fff; transform:scale(1.1);}

/* ═══ CATCHMIND VIEW (The "Touch to Match" UI) ═══ */
#s-view {background:#000;}
.view-img-wrap {flex:1; display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer;}
#cResultImg {max-width:100%; max-height:100%; object-fit:contain;}
.view-overlay-hint {position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.5); padding:8px 16px; border-radius:20px; font-size:12px; color:#aaa; pointer-events:none;}

/* Hidden Answer Toggle */
.btn-ans-check {position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:#fff; padding:10px 16px; border-radius:14px; font-size:13px; font-weight:800; border:1px solid var(--bdr); z-index:10;}
.ans-popup {display:none; position:absolute; top:70px; right:20px; background:var(--acc); color:#0D0D1A; padding:12px 20px; border-radius:14px; font-family:'Black Han Sans',sans-serif; font-size:22px; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:10;}

/* Matching Popup */
.match-ov {display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); place-items:center; padding:24px;}
.match-ov.show {display:grid;}
.match-card {background:var(--card); border-radius:28px; padding:32px 24px; width:100%; max-width:360px; border:1.5px solid var(--bdr); text-align:center;}
.btn-match {width:100%; height:64px; border-radius:18px; border:none; font-family:'Black Han Sans',sans-serif; font-size:20px; margin-bottom:12px; cursor:pointer;}

/* ═══ GARTIC DESIGN RESTORE ═══ */
.g-setup-body {max-width:440px; margin:0 auto; padding:24px 20px;}
.photo-opts {display:flex; gap:10px; margin-bottom:20px;}
.photo-opt {flex:1; height:54px; border-radius:14px; border:1.5px solid var(--bdr); background:var(--card); color:var(--mut); font-weight:800; cursor:pointer;}
.photo-opt.sel {border-color:var(--g1); background:rgba(124,58,237,0.15); color:#c4b5fd;}
.name-input {width:100%; height:54px; border-radius:14px; border:1.5px solid var(--bdr); background:var(--card); color:#fff; padding:0 18px; margin-bottom:10px; font-weight:700;}

/* AI Eval Result */
.ai-reason {font-size:15px; line-height:1.7; background:var(--card); border-radius:18px; padding:20px; border:1.5px solid var(--bdr); text-align:left; margin-top:20px;}
</style>
</head>
<body>

<div id="s-main" class="screen active">
  <div class="main-inner">
    <div class="main-logo">🎨 DRAWING HUB</div>
    <div class="main-title font-black">그림 게임</div>
    <div style="margin-top:40px;">
      <div class="game-card" onclick="showScreen('s-intro')" style="border-color:var(--acc);">
        <div class="gc-title" style="color:var(--acc)">캐치마인드</div>
        <div class="gc-desc">제시어를 그림으로 표현하세요. 화면을 터치해 정답 판정을 내립니다.</div>
      </div>
      <div class="game-card" onclick="selectGMode('compete')" style="border-color:var(--acc2);">
        <div class="gc-title" style="color:var(--acc2)">팀 경쟁 (AI 배틀)</div>
        <div class="gc-desc">두 팀이 같은 제시어로 대결하고 AI 평론가의 판정을 받습니다.</div>
      </div>
      <div class="game-card" onclick="selectGMode('draw')" style="border-color:var(--g1);">
        <div class="gc-title" style="color:var(--g1)">그리기&설명</div>
        <div class="gc-desc">단어에서 그림으로, 그림에서 단어로 이어지는 전달 게임.</div>
      </div>
    </div>
  </div>
</div>

<div id="s-intro" class="screen">
  <div class="hdr"><button class="btn-bk" onclick="showScreen('s-main')">←</button><div class="hdr-ttl">캐치마인드 설정</div></div>
  <div class="scrollable" style="padding:40px 24px; text-align:center;">
    <div class="font-black" style="font-size:24px; margin-bottom:20px;">제한 시간 선택</div>
    <div style="display:flex; gap:10px; margin-bottom:40px;">
      <button class="photo-opt sel" id="cT1" onclick="cSetLimit(1, this)">1분</button>
      <button class="photo-opt" id="cT3" onclick="cSetLimit(3, this)">3분</button>
      <button class="photo-opt" id="cT5" onclick="cSetLimit(5, this)">5분</button>
    </div>
    <button class="btn-match" style="background:var(--acc); color:#000;" onclick="initDial()">설정 완료 →</button>
  </div>
</div>

<div id="s-dial" class="screen">
  <div class="hdr"><button class="btn-bk" onclick="showScreen('s-intro')">←</button><div class="hdr-ttl">단어 뽑기</div></div>
  <div class="dial-body">
    <div class="slot-wrap"><div class="slot-hl"></div><div class="slot-track" id="cTrack"></div></div>
    <button class="btn-bk" style="width:100%; height:54px; max-width:340px; font-weight:800; margin-bottom:12px;" onclick="spinDial()">🎲 무작위 단어 뽑기</button>
    <button class="btn-go" id="cBtnGo" onclick="startCDraw()">그리기 시작!</button>
  </div>
</div>

<div id="s-draw" class="screen">
  <div class="hdr" style="background:#0e0e1e">
    <button class="btn-bk" onclick="confirmEndGame()">종료</button>
    <div class="hdr-ttl" id="cDrawWord" style="color:var(--acc)">---</div>
    <div id="cTimer" class="font-black" style="color:var(--acc2); font-size:18px;">01:00</div>
  </div>
  <canvas id="cCanvas" style="flex:1; width:100%;"></canvas>
  <div class="tools-wrap">
    <div class="palette" id="cPalette"></div>
    <div class="tools-top" style="margin-top:10px;">
      <button class="ti on" id="cPen" onclick="cSetTool('pencil')">✏️</button>
      <button class="ti" id="cErs" onclick="cSetTool('eraser')">◻️</button>
      <button class="ti" onclick="cUndo()">↩️</button>
      <button class="ti" onclick="cClear()">🗑️</button>
      <button class="btn-match" style="margin-left:auto; margin-bottom:0; width:150px; height:44px; background:var(--acc); color:#000; font-size:14px;" onclick="submitCDraw()">그림 완성! 🎨</button>
    </div>
  </div>
</div>

<div id="s-view" class="screen">
  <button class="btn-ans-check" onmousedown="showAns(true)" onmouseup="showAns(false)" ontouchstart="showAns(true)" ontouchend="showAns(false)">👁️ 정답 확인 (HOLD)</button>
  <div id="ansPopup" class="ans-popup">정답: ---</div>
  
  <div class="view-img-wrap" onclick="openMatchOv()">
    <img id="cResultImg">
    <div class="view-overlay-hint">그림을 터치하면 정답 판정 메뉴가 나옵니다</div>
  </div>
</div>

<div class="match-ov" id="matchOv">
  <div class="match-card">
    <div class="font-black" style="font-size:24px; margin-bottom:10px;">정답을 맞췄습니까?</div>
    <div id="vStopwatch" style="font-size:18px; color:var(--acc3); margin-bottom:24px;">⏱️ 측정 시간: 0.0초</div>
    <button class="btn-match" style="background:var(--acc3); color:#0D0D1A;" onclick="finishMatch(true)">YES! 맞췄습니다 ✅</button>
    <button class="btn-match" style="background:rgba(255,255,255,0.05); color:var(--mut);" onclick="closeMatchOv()">NO.. 아직입니다 ❌</button>
    <button class="btn-match" style="background:var(--acc2); color:#fff; font-size:14px; height:44px; margin-top:10px;" onclick="showScreen('s-main')">게임 포기 / 홈으로</button>
  </div>
</div>

<div id="s-g-setup" class="screen">
  <div class="hdr hdr-pu"><button class="btn-bk" onclick="showScreen('s-main')">←</button><div class="hdr-ttl" id="setupModeTitle">설정</div></div>
  <div class="g-setup-body scrollable flex-1">
    <div class="font-black" style="font-size:18px; margin-bottom:12px;">1단계 시작 방식</div>
    <div class="photo-opts">
      <button class="photo-opt sel" id="smWord" onclick="setStartMode('word')">✏️ 글로 시작</button>
      <button class="photo-opt" id="smDraw" onclick="setStartMode('draw')">🎨 그림 시작</button>
    </div>
    <div class="font-black" style="font-size:18px; margin-bottom:12px;">인원 설정</div>
    <div style="display:flex; align-items:center; gap:20px; margin-bottom:30px;">
      <button class="btn-bk" onclick="adjPlayers(-1)">-</button>
      <div id="pcNum" class="font-black" style="font-size:40px; color:var(--acc);">2</div>
      <button class="btn-bk" onclick="adjPlayers(1)">+</button>
    </div>
    <div id="nameList"></div>
    <button class="btn-match" style="background:linear-gradient(135deg,#7C3AED,#2563EB); color:#fff; margin-top:20px;" onclick="startGartic()">게임 시작 🎲</button>
  </div>
</div>

<div id="s-g-results" class="screen">
  <div class="hdr hdr-pu"><div class="hdr-ttl">최종 결과</div><button class="btn-bk" onclick="showScreen('s-main')">🏠</button></div>
  <div id="gResultChains" class="scrollable flex-1" style="padding:20px;"></div>
  <div style="padding:20px; background:var(--bg2);">
    <button class="btn-match" style="background:var(--g1); color:#fff;" onclick="runAiEval()">🤖 AI 상세 평론 보기</button>
    <button class="btn-match" style="background:var(--card); color:var(--mut);" onclick="nextChain()">다음 라운드 / 재경기</button>
  </div>
</div>

<div class="ov-bot" id="ov-ai-eval">
    <div class="ov-sheet">
        <div id="aiEvalContent"></div>
        <button class="btn-match" style="background:var(--card); margin-top:20px; height:50px; font-size:14px;" onclick="closeOv('ov-ai-eval')">심사평 닫기</button>
    </div>
</div>

<script>
// 📋 단어 데이터 (100개)
const W = [{w:"냉장고"},{w:"소방차"},{w:"사과"},{w:"강아지"},{w:"자동차"},{w:"피자"},{w:"무지개"},{w:"눈사람"},{w:"고래"},{w:"피아노"},{w:"비행기"},{w:"축구공"},{w:"나비"},{w:"달팽이"},{w:"펭귄"},{w:"트럭"},{w:"아이스크림"},{w:"구름"},{w:"풍선"},{w:"장미"},{w:"잠수함"},{w:"문어"},{w:"선인장"},{w:"드래곤"},{w:"수박"},{w:"오리"},{w:"거북이"},{w:"화산"},{w:"호랑이"},{w:"코끼리"},{w:"컴퓨터"},{w:"전화기"},{w:"안경"},{w:"모자"},{w:"우산"},{w:"운동화"},{w:"치킨"},{w:"햄버거"},{w:"콜라"},{w:"커피"},{w:"기린"},{w:"치타"},{w:"원숭이"},{w:"토끼"},{w:"다람쥐"},{w:"캥거루"},{w:"판다"},{w:"여우"},{w:"늑대"},{w:"사자"},{w:"포크"},{w:"숟가락"},{w:"냄비"},{w:"가위"},{w:"연필"},{w:"지우개"},{w:"책상"},{w:"의자"},{w:"침대"},{w:"티비"},{w:"에어컨"},{w:"선풍기"},{w:"청소기"},{w:"세탁기"},{w:"다리미"},{w:"시계"},{w:"거울"},{w:"빗"},{w:"비누"},{w:"치약"},{w:"축구"},{w:"농구"},{w:"야구"},{w:"수영"},{w:"태권도"},{w:"발레"},{w:"요리사"},{w:"경찰관"},{w:"의사"},{w:"선생님"},{w:"우주선"},{w:"외계인"},{w:"로봇"},{w:"유령"},{w:"공룡"},{w:"성"},{w:"궁전"},{w:"보물상자"},{w:"지도"},{w:"나침반"},{w:"카메라"},{w:"기타"},{w:"바이올린"},{w:"드럼"},{w:"전등"},{w:"열쇠"},{w:"자물쇠"},{w:"망치"},{w:"드라이버"},{w:"텐트"}];
const CLRS = [{h:'#111'},{h:'#fff'},{h:'#EF4444'},{h:'#F97316'},{h:'#FACC15'},{h:'#22C55E'},{h:'#3B82F6'},{h:'#8B5CF6'},{h:'#EC4899'},{h:'#92400E'}];

let cLimit = 1, cTimeLeft = 60, cTimerInt = null, cWord = "", cSwInt = null, cSwTime = 0;

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function openOv(id){document.getElementById(id).classList.add('show')}
function closeOv(id){document.getElementById(id).classList.remove('show')}
function cSetLimit(m, btn){cLimit=m; document.querySelectorAll('.photo-opt').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel')}

/* CATCHMIND */
function initDial() {
  document.getElementById('cBtnGo').classList.remove('vis');
  const track = document.getElementById('cTrack');
  track.style.transition = 'none'; track.style.transform = 'translateY(0)';
  track.innerHTML = '<div class="slot-item">준비</div>';
  showScreen('s-dial');
}

function spinDial() {
  const track = document.getElementById('cTrack');
  track.innerHTML = '';
  let words = []; for(let i=0; i<30; i++) words.push(W[Math.floor(Math.random()*W.length)].w);
  cWord = words[29];
  words.forEach((w, i) => track.innerHTML += `<div class="slot-item ${i===29?'ctr':''}">${w}</div>`);
  track.style.transition = 'none'; track.style.transform = 'translateY(0)';
  setTimeout(() => {
    track.style.transition = 'transform 3s cubic-bezier(0.15, 1.1, 0.2, 1)';
    track.style.transform = `translateY(-${68 * 29}px)`;
  }, 50);
  setTimeout(() => document.getElementById('cBtnGo').classList.add('vis'), 3000);
}

let cCvs, cCtx, cDrawing=false, cLastP=null, cTool='pencil', cClr='#111', cSnaps=[];
function startCDraw() {
  document.getElementById('cDrawWord').textContent = cWord;
  cTimeLeft = cLimit * 60;
  showScreen('s-draw');
  requestAnimationFrame(() => {
    cCvs = document.getElementById('cCanvas'); const r = cCvs.getBoundingClientRect(); const dpr = window.devicePixelRatio||1;
    cCvs.width = r.width*dpr; cCvs.height = r.height*dpr; cCtx = cCvs.getContext('2d'); cCtx.scale(dpr,dpr);
    cCtx.fillStyle='#fff'; cCtx.fillRect(0,0,r.width,r.height);
    cSnaps = [cCvs.toDataURL()];
    cCvs.addEventListener('pointerdown', e => {cDrawing=true; cLastP=cGetP(e);});
    window.addEventListener('pointermove', e => {
      if(!cDrawing) return; const p=cGetP(e); cCtx.beginPath(); cCtx.lineCap='round'; cCtx.lineWidth=cTool==='eraser'?20:5;
      cCtx.strokeStyle=cTool==='eraser'?'#fff':cClr; cCtx.moveTo(cLastP.x,cLastP.y); cCtx.lineTo(p.x,p.y); cCtx.stroke(); cLastP=p;
    });
    window.addEventListener('pointerup', () => {if(cDrawing){cDrawing=false; cSnaps.push(cCvs.toDataURL());}});
  });
  const pal = document.getElementById('cPalette'); pal.innerHTML = '';
  CLRS.forEach(c => {
    const el = document.createElement('div'); el.className = 'clr'; el.style.background = c.h;
    el.onclick = () => {cClr=c.h; cTool='pencil'; document.querySelectorAll('.clr').forEach(x=>x.classList.remove('on')); el.classList.add('on')};
    pal.appendChild(el);
  });
  clearInterval(cTimerInt);
  cTimerInt = setInterval(() => {
    cTimeLeft--; const m=Math.floor(cTimeLeft/60), s=cTimeLeft%60;
    document.getElementById('cTimer').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    if(cTimeLeft<=0){clearInterval(cTimerInt); submitCDraw();}
  }, 1000);
}
function cGetP(e){ const r=cCvs.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function cUndo(){ if(cSnaps.length>1){cSnaps.pop(); const img=new Image(); img.src=cSnaps[cSnaps.length-1]; img.onload=()=>cCtx.drawImage(img,0,0,cCvs.width/2,cCvs.height/2);} }
function cClear(){ cCtx.fillStyle='#fff'; cCtx.fillRect(0,0,cCvs.width,cCvs.height); cSnaps.push(cCvs.toDataURL()); }
function cSetTool(t){cTool=t; document.getElementById('cPen').classList.toggle('on',t==='pencil'); document.getElementById('cErs').classList.toggle('on',t==='eraser');}

function submitCDraw() {
  clearInterval(cTimerInt);
  document.getElementById('cResultImg').src = cCvs.toDataURL();
  document.getElementById('ansPopup').textContent = `정답: ${cWord}`;
  showScreen('s-view');
  
  // 스톱워치 시작
  cSwTime = 0; clearInterval(cSwInt);
  cSwInt = setInterval(() => { cSwTime += 0.1; document.getElementById('cStopwatch').textContent = cSwTime.toFixed(1); }, 100);
}

function showAns(v){ document.getElementById('ansPopup').style.display = v ? 'block' : 'none'; }
function openMatchOv(){ document.getElementById('matchOv').classList.add('show'); }
function closeMatchOv(){ document.getElementById('matchOv').classList.remove('show'); }
function finishMatch(yes) {
  if(yes) { clearInterval(cSwInt); alert(`🎉 정답! 기록: ${cSwTime.toFixed(1)}초`); showScreen('s-main'); }
  closeMatchOv();
}

/* GARTIC */
const G = {mode:'draw', players:[], chains:[], cIdx:0, sIdx:0};
function selectGMode(m){G.mode=m; showScreen('s-g-setup'); adjPlayers(0);}
function adjPlayers(d){
  let n = parseInt(document.getElementById('pcNum').textContent)+d; n=Math.max(2,n);
  document.getElementById('pcNum').textContent = n;
  const list = document.getElementById('nameList'); list.innerHTML = '';
  for(let i=0; i<n; i++) list.innerHTML += `<input class="name-input" id="gp${i}" placeholder="플레이어 ${i+1}">`;
}
